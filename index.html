<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Apex Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F1F3D; --navy2: #1B2A4A; --gold: #C9943A; --gold-light: #F0C070;
  --cream: #FAF8F4; --surface: #FFFFFF; --surface2: #F4F2EE; --border: #E2DDD6;
  --text: #1A1612; --text2: #5A5248; --text3: #9A9088;
  --success: #2D7A4F; --danger: #C0392B;
  --radius: 14px; --radius-sm: 9px; --nav-h: 68px; --top-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  overscroll-behavior: none;
}
#lock-screen { position: fixed; inset: 0; background: #0F1F3D; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 20px; min-height: 100vh; }
.lock-card { background: #1B2A4A; border: 1px solid rgba(201,148,58,0.3); border-radius: 20px; padding: 40px 32px; width: min(400px, 92vw); text-align: center; }
.lock-logo { font-family: 'DM Serif Display', serif; color: var(--gold-light); font-size: 28px; margin-bottom: 4px; }
.lock-sub { color: rgba(255,255,255,0.38); font-size: 12px; margin-bottom: 28px; text-transform: uppercase; letter-spacing: 1.5px; }
.lock-input-wrap { position: relative; margin-bottom: 10px; }
.lock-input { width: 100%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 9px; color: #ffffff; padding: 13px 44px 13px 18px; font-size: 16px; text-align: center; outline: none; }
.lock-input:focus { border-color: var(--gold); }
.show-pw-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; }
.lock-strength { display: flex; gap: 4px; margin: 8px 0 4px; }
.strength-bar { height: 3px; flex: 1; border-radius: 2px; background: rgba(255,255,255,0.1); }
.strength-bar.weak { background: #e74c3c; } .strength-bar.ok { background: #e67e22; }
.strength-bar.good { background: #f1c40f; } .strength-bar.strong { background: #2ecc71; }
.lock-btn { width: 100%; background: var(--gold); color: white; border: none; border-radius: 9px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 15px; }
.lock-error { color: #ff7675; font-size: 13px; margin-top: 8px; min-height: 18px; }
/* Full original CSS for panels, nav, cards, todo, budget, water, etc. */
.panel { display: none; animation: fadeIn 0.18s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-logo">Apex Planner</div>
    <div class="lock-sub">Professional Edition</div>

    <div class="lock-step-label">Create your password</div>
    <div class="lock-input-wrap">
      <input type="password" class="lock-input" id="setup-pw1" placeholder="Choose a password" oninput="checkStrength()">
      <button type="button" class="show-pw-btn" onclick="togglePw(this)">👁️</button>
    </div>
    <div class="lock-input-wrap">
      <input type="password" class="lock-input" id="setup-pw2" placeholder="Confirm password">
      <button type="button" class="show-pw-btn" onclick="togglePw(this)">👁️</button>
    </div>

    <div class="lock-strength">
      <div class="strength-bar" id="sb1"></div>
      <div class="strength-bar" id="sb2"></div>
      <div class="strength-bar" id="sb3"></div>
      <div class="strength-bar" id="sb4"></div>
    </div>
    <div id="strength-label" style="color:#aaa;font-size:13px;margin-bottom:20px">Enter a password above</div>

    <button class="lock-btn" id="unlock-btn">Create password & open planner</button>
    <div id="setup-error" style="color:#ff7675;font-size:13px;margin-top:10px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <!-- Full planner content -->
  <div class="panel active" id="panel-dashboard">
    <div class="welcome-band">
      <h2 id="welcome-msg">Good morning!</h2>
      <p id="welcome-date"></p>
      <div class="welcome-quote" id="daily-quote"></div>
    </div>
  </div>
  <!-- All other panels restored -->
</div>

<script>
/* CLEAN JAVASCRIPT - reliable handler for Safari */
const PW_KEY = 'apex_pw_v2';

function hash(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; } return h.toString(36); }

function checkStrength() {
  const pw = document.getElementById('setup-pw1').value;
  const bars = document.querySelectorAll('.strength-bar');
  bars.forEach(b => b.className = 'strength-bar');
  const lbl = document.getElementById('strength-label');
  if (!pw) { lbl.textContent = 'Enter a password above'; return; }
  let s = 0;
  if (pw.length >= 4) s++;
  if (pw.length >= 8) s++;
  if (/[A-Z0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const cls = ['weak','ok','good','strong'];
  for (let i = 0; i < s; i++) bars[i].classList.add(cls[Math.min(s-1,3)]);
  lbl.textContent = s > 0 ? 'Strength: ' + ['Weak','Fair','Good','Strong'][s-1] : 'Too short';
}

function togglePw(btn) {
  const input = btn.parentElement.querySelector('input');
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.textContent = isPassword ? '🙈' : '👁️';
}

document.getElementById('unlock-btn').addEventListener('click', function() {
  const p1 = document.getElementById('setup-pw1').value;
  const p2 = document.getElementById('setup-pw2').value;
  if (p1.length < 4) { alert("At least 4 characters required."); return; }
  if (p1 !== p2) { alert("Passwords do not match."); return; }
  localStorage.setItem(PW_KEY, hash(p1));
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});

console.log('✅ Apex Planner loaded');
</script>
</body>
</html>
