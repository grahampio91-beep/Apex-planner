<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Apex Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1F3D;--gold:#C9943A;--gold-light:#F0C070;--cream:#FAF8F4}
* {margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#0F1F3D;display:flex;align-items:center;justify-content:center}
.lock-card{background:#1B2A4A;color:white;padding:40px 30px;border-radius:20px;width:90%;max-width:380px;text-align:center}
.lock-logo{font-family:'DM Serif Display',serif;font-size:32px;color:#F0C070;margin-bottom:8px}
.lock-input{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);color:white;padding:14px;border-radius:8px;width:100%;margin:10px 0;font-size:16px;text-align:center}
.lock-btn{background:var(--gold);color:white;border:none;padding:14px;border-radius:8px;width:100%;font-weight:600;cursor:pointer}
.lock-strength{display:flex;gap:4px;margin:10px 0}
.strength-bar{height:4px;flex:1;border-radius:2px;background:rgba(255,255,255,0.2)}
.strength-bar.weak{background:#e74c3c}
.strength-bar.ok{background:#e67e22}
.strength-bar.good{background:#f1c40f}
.strength-bar.strong{background:#2ecc71}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-logo">Apex Planner</div>
    <div class="lock-sub">Professional Edition</div>

    <div class="lock-step-label">Create your password</div>
    <input type="password" class="lock-input" id="setup-pw1" placeholder="Choose a password" oninput="checkStrength()">
    <input type="password" class="lock-input" id="setup-pw2" placeholder="Confirm password">

    <div class="lock-strength">
      <div class="strength-bar" id="sb1"></div>
      <div class="strength-bar" id="sb2"></div>
      <div class="strength-bar" id="sb3"></div>
      <div class="strength-bar" id="sb4"></div>
    </div>
    <div id="strength-label" style="color:#aaa;font-size:13px;margin-bottom:20px">Enter a password above</div>

    <button class="lock-btn" id="unlock-btn">Create password & open planner</button>
    <div id="setup-error" style="color:#ff7675;font-size:13px;margin-top:10px"></div>
  </div>
</div>

<script>
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; }
  return h.toString(36);
}

function checkStrength() {
  const pw = document.getElementById('setup-pw1').value;
  const bars = document.querySelectorAll('.strength-bar');
  bars.forEach(b => b.className = 'strength-bar');
  const lbl = document.getElementById('strength-label');
  if (!pw) { lbl.textContent = 'Enter a password above'; return; }
  let s = 0;
  if (pw.length >= 4) s++;
  if (pw.length >= 8) s++;
  if (/[A-Z0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const cls = ['weak','ok','good','strong'];
  for (let i = 0; i < s; i++) bars[i].classList.add(cls[Math.min(s-1,3)]);
  lbl.textContent = s > 0 ? 'Strength: ' + ['Weak','Fair','Good','Strong'][s-1] : 'Too short';
}

// THIS IS THE KEY CHANGE FOR TESTING
document.getElementById('unlock-btn').addEventListener('click', function() {
  alert("✅ Button clicked! Now trying to unlock...");
  const p1 = document.getElementById('setup-pw1').value;
  const p2 = document.getElementById('setup-pw2').value;
  if (p1.length < 4) { alert("Password too short"); return; }
  if (p1 !== p2) { alert("Passwords do not match"); return; }
  localStorage.setItem('apex_pw_v2', hash(p1));
  document.getElementById('lock-screen').style.display = 'none';
  alert("🎉 Planner unlocked! (Full version would show dashboard here)");
  document.body.innerHTML += '<h2 style="text-align:center;margin-top:50px;color:#0F1F3D">Welcome to your Apex Planner! ✅</h2>';
});
</script>
</body>
</html>
